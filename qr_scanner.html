<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>QR・文字スキャナー</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Noto+Sans+JP:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131c;
    --card: #1a1a28;
    --border: #2a2a40;
    --accent: #00e5ff;
    --accent2: #7c4dff;
    --success: #00e676;
    --warn: #ffab40;
    --text: #e8e8f0;
    --muted: #6b6b8a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景グリッド */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px 16px 40px;
  }

  header {
    text-align: center;
    padding: 28px 0 24px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.08em;
  }

  /* アップロードゾーン */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 36px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,229,255,0.05), rgba(124,77,255,0.05));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .upload-zone:hover::before,
  .upload-zone.drag-over::before { opacity: 1; }
  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .upload-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .upload-zone h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .upload-zone p {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .upload-btn {
    display: inline-block;
    margin-top: 18px;
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border-radius: 50px;
    font-weight: 700;
    font-size: 14px;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 20px rgba(0,229,255,0.3);
  }

  .upload-btn:hover { transform: scale(1.05); box-shadow: 0 6px 28px rgba(0,229,255,0.4); }

  #fileInput { display: none; }

  /* プレビュー */
  .preview-section {
    margin-top: 20px;
    display: none;
  }

  .preview-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  #previewCanvas {
    width: 100%;
    display: block;
    max-height: 320px;
    object-fit: contain;
  }

  .qr-highlight {
    position: absolute;
    border: 3px solid var(--accent);
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(0,229,255,0.6);
    pointer-events: none;
    transition: all 0.3s;
  }

  /* スキャンボタン */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }

  .btn {
    padding: 14px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.04em;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-qr {
    background: rgba(0,229,255,0.12);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.3);
  }

  .btn-qr:hover { background: rgba(0,229,255,0.22); transform: translateY(-1px); }

  .btn-ocr {
    background: rgba(124,77,255,0.12);
    color: #a78bfa;
    border: 1px solid rgba(124,77,255,0.3);
  }

  .btn-ocr:hover { background: rgba(124,77,255,0.22); transform: translateY(-1px); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* 処理中インジケータ */
  .processing {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* 結果エリア */
  .results {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .result-card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    overflow: hidden;
    animation: slideUp 0.35s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .result-badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.06em;
  }

  .badge-qr { background: rgba(0,229,255,0.15); color: var(--accent); }
  .badge-ocr { background: rgba(124,77,255,0.15); color: #a78bfa; }
  .badge-success { background: rgba(0,230,118,0.15); color: var(--success); }
  .badge-warn { background: rgba(255,171,64,0.15); color: var(--warn); }

  .result-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--muted);
  }

  .result-body { padding: 14px 16px; }

  .result-item {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid var(--accent);
    position: relative;
  }

  .result-item:last-child { margin-bottom: 0; }
  .result-item.ocr-item { border-left-color: #7c4dff; }

  .result-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .result-text {
    font-size: 14px;
    line-height: 1.6;
    word-break: break-all;
    white-space: pre-wrap;
    color: var(--text);
  }

  .result-text.large { font-size: 16px; font-weight: 700; }

  .copy-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--border);
    border: none;
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    transition: background 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .copy-btn:hover { background: var(--accent); color: #000; }
  .copy-btn.copied { background: var(--success); color: #000; }

  /* エラー・情報 */
  .info-box {
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.6;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  .info-box.error { background: rgba(255,82,82,0.1); border: 1px solid rgba(255,82,82,0.3); color: #ff8a80; }
  .info-box.info { background: rgba(0,229,255,0.07); border: 1px solid rgba(0,229,255,0.2); color: var(--muted); }

  /* リセットボタン */
  .reset-btn {
    width: 100%;
    margin-top: 16px;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Tesseract進捗 */
  .progress-bar-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
    display: none;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📷 QR・文字スキャナー</h1>
    <p>写真をアップしてQRコード・テキストを認識</p>
  </header>

  <!-- アップロードゾーン -->
  <div class="upload-zone" id="uploadZone">
    <div class="upload-icon">📷</div>
    <h2>写真をアップロード</h2>
    <p>iPhoneで撮影した写真をここにドロップ<br>または下のボタンをタップ</p>
    <label class="upload-btn" for="fileInput">📁 写真を選択</label>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
  </div>

  <!-- プレビュー -->
  <div class="preview-section" id="previewSection">
    <div class="preview-wrap">
      <canvas id="previewCanvas"></canvas>
    </div>

    <div class="action-row">
      <button class="btn btn-qr" id="btnQR" onclick="scanQR()">
        <span>⬛</span> QR読み取り
      </button>
      <button class="btn btn-ocr" id="btnOCR" onclick="scanOCR()">
        <span>🔤</span> 文字認識
      </button>
    </div>

    <div class="processing" id="processing">
      <div class="spinner"></div>
      <span id="processingMsg">処理中...</span>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
    </div>
  </div>

  <!-- 結果 -->
  <div class="results" id="results"></div>
</div>

<script>
// ======== 状態 ========
let currentImage = null;
let currentFile = null;
let tesseractWorker = null;

// ======== ファイル読み込み ========
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImage(e.target.files[0]);
});

uploadZone.addEventListener('dragover', e => {
  e.preventDefault();
  uploadZone.classList.add('drag-over');
});
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});

function loadImage(file) {
  currentFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      currentImage = img;
      drawPreview(img);
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('results').innerHTML = '';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function drawPreview(img) {
  const canvas = document.getElementById('previewCanvas');
  const maxW = 448, maxH = 320;
  let w = img.width, h = img.height;
  if (w > maxW) { h = h * maxW / w; w = maxW; }
  if (h > maxH) { w = w * maxH / h; h = maxH; }
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);
}

// ======== QRコード ========
function scanQR() {
  if (!currentImage) return;
  setProcessing(true, 'QRコードを検出中...');

  const canvas = document.createElement('canvas');
  canvas.width = currentImage.width;
  canvas.height = currentImage.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(currentImage, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  setTimeout(() => {
    const code = jsQR(imageData.data, imageData.width, imageData.height, {
      inversionAttempts: 'dontInvert'
    });

    setProcessing(false);

    if (code) {
      showQRResult(code);
    } else {
      // 反転で再試行
      const code2 = jsQR(imageData.data, imageData.width, imageData.height, {
        inversionAttempts: 'onlyInvert'
      });
      if (code2) {
        showQRResult(code2);
      } else {
        addResult('qr-fail', null);
      }
    }
  }, 100);
}

function showQRResult(code) {
  // プレビューにハイライト（概算位置）
  highlightQR(code.location);
  addResult('qr', code.data);
}

function highlightQR(loc) {
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const img = currentImage;
  const scaleX = canvas.width / img.width;
  const scaleY = canvas.height / img.height;

  // 再描画してハイライト
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(loc.topLeftCorner.x * scaleX, loc.topLeftCorner.y * scaleY);
  ctx.lineTo(loc.topRightCorner.x * scaleX, loc.topRightCorner.y * scaleY);
  ctx.lineTo(loc.bottomRightCorner.x * scaleX, loc.bottomRightCorner.y * scaleY);
  ctx.lineTo(loc.bottomLeftCorner.x * scaleX, loc.bottomLeftCorner.y * scaleY);
  ctx.closePath();
  ctx.stroke();
}

// ======== OCR (Tesseract.js) ========
async function scanOCR() {
  if (!currentImage) return;
  setProcessing(true, 'Tesseractを読み込み中...', true);

  try {
    // Tesseract.js を動的ロード
    if (!window.Tesseract) {
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.1.0/tesseract.min.js');
    }

    const { data: { text, confidence, blocks } } = await Tesseract.recognize(
      currentImage.src || currentFile,
      'jpn+eng',
      {
        logger: m => {
          if (m.status === 'recognizing text') {
            document.getElementById('processingMsg').textContent =
              `文字認識中... ${Math.round(m.progress * 100)}%`;
            setProgressBar(m.progress * 100);
          } else if (m.status === 'loading language traineddata') {
            document.getElementById('processingMsg').textContent = '言語データ読み込み中...';
          }
        }
      }
    );

    setProcessing(false);
    addResult('ocr', { text: text.trim(), confidence: Math.round(confidence) });

  } catch (err) {
    setProcessing(false);
    addResult('ocr-fail', err.message);
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

// ======== 結果表示 ========
function addResult(type, data) {
  const results = document.getElementById('results');

  if (type === 'qr') {
    const isURL = /^https?:\/\//.test(data);
    const card = `
      <div class="result-card">
        <div class="result-header">
          <span class="result-badge badge-qr">QR CODE</span>
          <span class="result-badge badge-success">✓ 検出成功</span>
        </div>
        <div class="result-body">
          <div class="result-item">
            <div class="result-label">デコード結果</div>
            <div class="result-text large">${escHtml(data)}</div>
            <button class="copy-btn" onclick="copyText(this, '${escAttr(data)}')">コピー</button>
          </div>
          ${isURL ? `<div class="info-box info">🔗 URLが検出されました。<br><a href="${escHtml(data)}" target="_blank" style="color:var(--accent)">${escHtml(data)}</a></div>` : ''}
        </div>
      </div>`;
    results.insertAdjacentHTML('beforeend', card);

  } else if (type === 'qr-fail') {
    const card = `
      <div class="result-card">
        <div class="result-header">
          <span class="result-badge badge-qr">QR CODE</span>
          <span class="result-badge badge-warn">未検出</span>
        </div>
        <div class="result-body">
          <div class="info-box error">⚠️ QRコードが見つかりませんでした。<br>• 写真のピントが合っているか確認<br>• QRコード全体が写っているか確認<br>• 明るい場所で再撮影してみてください</div>
        </div>
      </div>`;
    results.insertAdjacentHTML('beforeend', card);

  } else if (type === 'ocr') {
    const { text, confidence } = data;
    const confColor = confidence > 80 ? 'badge-success' : confidence > 50 ? 'badge-warn' : 'badge-warn';
    const lines = text.split('\n').filter(l => l.trim());
    const card = `
      <div class="result-card">
        <div class="result-header">
          <span class="result-badge badge-ocr">OCR TEXT</span>
          <span class="result-badge ${confColor}">信頼度 ${confidence}%</span>
          <span class="result-count">${lines.length}行</span>
        </div>
        <div class="result-body">
          ${text ? `
          <div class="result-item ocr-item">
            <div class="result-label">認識テキスト</div>
            <div class="result-text">${escHtml(text)}</div>
            <button class="copy-btn" onclick="copyText(this, ${JSON.stringify(text)})">コピー</button>
          </div>` : `<div class="info-box error">⚠️ テキストが認識できませんでした。画像にテキストが含まれているか確認してください。</div>`}
        </div>
      </div>`;
    results.insertAdjacentHTML('beforeend', card);

  } else if (type === 'ocr-fail') {
    const card = `
      <div class="result-card">
        <div class="result-header">
          <span class="result-badge badge-ocr">OCR</span>
          <span class="result-badge badge-warn">エラー</span>
        </div>
        <div class="result-body">
          <div class="info-box error">⚠️ OCRエラー: ${escHtml(data || '不明なエラー')}<br>ネットワーク接続を確認してください。</div>
        </div>
      </div>`;
    results.insertAdjacentHTML('beforeend', card);
  }

  // リセットボタン
  if (!document.getElementById('resetBtn')) {
    results.insertAdjacentHTML('beforeend',
      `<button class="reset-btn" id="resetBtn" onclick="resetAll()">🔄 別の写真を読み込む</button>`
    );
  }
}

// ======== ユーティリティ ========
function setProcessing(show, msg = '', showProgress = false) {
  const el = document.getElementById('processing');
  el.style.display = show ? 'flex' : 'none';
  el.style.flexDirection = 'column';
  if (msg) document.getElementById('processingMsg').textContent = msg;
  document.getElementById('progressWrap').style.display = showProgress ? 'block' : 'none';
  document.getElementById('btnQR').disabled = show;
  document.getElementById('btnOCR').disabled = show;
}

function setProgressBar(pct) {
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('progressBar').style.width = pct + '%';
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ コピー済み';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('copied'); }, 2000);
  });
}

function resetAll() {
  currentImage = null;
  currentFile = null;
  document.getElementById('previewSection').style.display = 'none';
  document.getElementById('results').innerHTML = '';
  document.getElementById('fileInput').value = '';
  // canvas リセット
  const canvas = document.getElementById('previewCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str).replace(/'/g, "\\'").replace(/\n/g, '\\n');
}
</script>
</body>
</html>
